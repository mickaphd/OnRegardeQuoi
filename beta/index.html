<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ===== CHARACTER ENCODING & VIEWPORT ===== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== SEO META TAGS ===== -->
    <meta name="description" content="OnRegardeQuoi is a minimalist, open-source web app to discover and search for movies and TV shows.">
    <meta name="keywords" content="movies, tv shows, trailers, what to watch, cinema, streaming, netflix, hbo, amazon, film discovery, movie recommendations">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.onregardequoi.com/">

    <!-- ===== THEME & APPEARANCE ===== -->
    <meta name="theme-color" content="#080808">
    <meta name="color-scheme" content="dark">
    <title>OnRegardeQuoi.com - Discover Movies & TV Shows via Trailers</title>

    <!-- ===== PWA & ICONS ===== -->
    <link rel="icon" type="image/svg+xml" href="ressources/favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="ressources/apple-icon-180.png">
    <meta name="msapplication-config" content="browserconfig.xml">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trailers">

    <!-- ===== OPEN GRAPH (Social Media Preview) ===== -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.onregardequoi.com/">
    <meta property="og:title" content="OnRegardeQuoi.com - Discover Movies & TV Shows via Trailers">
    <meta property="og:description" content="Minimalist, open-source web app to discover and search for movies and TV shows.">
    <meta property="og:image" content="https://www.onregardequoi.com/ressources/icon.png">
    <meta property="og:image:alt" content="OnRegardeQuoi logo">

    <!-- ===== TWITTER CARD ===== -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="OnRegardeQuoi.com - Discover Movies & TV Shows via Trailers">
    <meta name="twitter:description" content="Minimalist, open-source web app to discover and search for movies and TV shows.">
    <meta name="twitter:image" content="https://www.onregardequoi.com/ressources/icon.png">

    <!-- ===== STYLESHEETS & FRAMEWORKS ===== -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">

    <!-- ===== STRUCTURED DATA (Schema.org) ===== -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "OnRegardeQuoi.com",
        "url": "https://www.onregardequoi.com",
        "description": "A minimalist, open-source web app to discover and search for movies and TV shows.",
        "applicationCategory": "Entertainment",
        "operatingSystem": "All",
        "image": "https://www.onregardequoi.com/ressources/icon.png",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>

    <!-- ===== LITE YOUTUBE EMBED ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lite-youtube-embed@0.3.0/src/lite-yt-embed.css">
    <script src="https://cdn.jsdelivr.net/npm/lite-youtube-embed@0.3.0/src/lite-yt-embed.js"></script>

    <!-- ===== ANALYTICS ===== -->
    <script data-goatcounter="https://mickaphd.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body class="bg-gray-950">

    <!-- ===== PRIMARY CONTENT CONTAINER ===== -->
    <div id="grid-container" class="h-screen overflow-y-auto"></div>

    <!-- ===== MENU BUTTON (Fixed Position) ===== -->
    <button id="btn" class="fixed bottom-6 left-6 md:top-6 z-50 w-12 h-12 rounded-full flex items-center justify-center shadow-lg border transition-all">
        <i class="fas fa-bars text-lg text-yellow-400"></i>
    </button>

    <!-- ===== OVERLAY FOR MENU & MODALS ===== -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-30"></div>

    <!-- ===== MAIN NAVIGATION MENU ===== -->
    <div id="menu" class="hidden fixed top-1/2 left-1/2 z-40 w-[90vw] max-w-md max-h-[80vh]" style="transform: translate(-50%, -50%);">
        <div class="menu rounded-2xl overflow-hidden shadow-2xl flex flex-col h-full">

            <!-- Search Bar -->
            <div class="p-4 border-b border-white/10 flex items-center gap-3 flex-shrink-0">
                <i class="fas fa-search text-yellow-500 text-lg flex-shrink-0"></i>
                <input id="search-input" placeholder="Search..." class="bg-transparent outline-none w-full text-white placeholder-gray-500">
            </div>

            <!-- Menu Items Container -->
            <div class="overflow-y-auto divide-y divide-white/10 flex-1">

                <!-- Movies Section -->
                <div>
                    <button class="w-full p-4 hover:bg-white/10 flex items-center justify-between text-white transition-colors" onclick="app.toggle('movies')">
                        <span class="flex items-center gap-3">
                            <i class="fas fa-film text-yellow-500 text-lg flex-shrink-0"></i>Movies
                        </span>
                        <i class="fas fa-chevron-down text-yellow-500 text-sm flex-shrink-0" id="movies-icon"></i>
                    </button>
                    <div id="movies-submenu" class="hidden bg-white/5 divide-y divide-white/5">
                        <button onclick="app.loadAndToggle('movie', 'trending')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">Trending Now</button>
                        <button onclick="app.loadAndToggle('movie', 'upcoming')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">Coming Soon</button>
                        <button onclick="app.loadAndToggle('movie', 'top_rated')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">All-Time Greats</button>
                    </div>
                </div>

                <!-- TV Shows Section -->
                <div>
                    <button class="w-full p-4 hover:bg-white/10 flex items-center justify-between text-white transition-colors" onclick="app.toggle('tv')">
                        <span class="flex items-center gap-3">
                            <i class="fas fa-tv text-yellow-500 text-lg flex-shrink-0"></i>TV Shows
                        </span>
                        <i class="fas fa-chevron-down text-yellow-500 text-sm flex-shrink-0" id="tv-icon"></i>
                    </button>
                    <div id="tv-submenu" class="hidden bg-white/5 divide-y divide-white/5">
                        <button onclick="app.loadAndToggle('tv', 'trending')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">Trending Now</button>
                        <button onclick="app.loadAndToggle('tv', 'on_the_air')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">Coming Soon</button>
                        <button onclick="app.loadAndToggle('tv', 'top_rated')" class="w-full p-3 px-6 text-sm text-gray-300 hover:text-yellow-500 text-left transition-colors">All-Time Greats</button>
                    </div>
                </div>

                <!-- Bookmarks -->
                <button class="w-full p-4 hover:bg-white/10 text-white flex items-center gap-3 transition-colors">
                    <i class="fas fa-bookmark text-yellow-500 text-lg flex-shrink-0"></i>Bookmarks
                </button>

                <!-- Settings -->
                <button class="w-full p-4 hover:bg-white/10 text-white flex items-center gap-3 transition-colors">
                    <i class="fas fa-cog text-yellow-500 text-lg flex-shrink-0"></i>Settings
                </button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: MORE INFORMATION ===== -->
    <div id="modal-info" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-30" onclick="modals.closeInfo(event)">
        <div class="menu fixed top-1/2 left-1/2 z-40 w-[90vw] max-w-md max-h-[80vh] rounded-2xl overflow-hidden shadow-2xl flex flex-col" style="transform: translate(-50%, -50%); pointer-events: all;" onclick="event.stopPropagation();">
            <div class="p-4 border-b border-white/10 flex items-center justify-between flex-shrink-0">
                <span class="text-white font-semibold flex items-center gap-2">
                    <i class="fas fa-lightbulb text-yellow-500"></i>More Information
                </span>
                <button onclick="modals.closeInfo()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-6 text-gray-300"></div>
        </div>
    </div>

    <!-- ===== MODAL: WHERE TO WATCH ===== -->
    <div id="modal-watch" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-30" onclick="modals.closeWatch(event)">
        <div class="menu fixed top-1/2 left-1/2 z-40 w-[90vw] max-w-md max-h-[80vh] rounded-2xl overflow-hidden shadow-2xl flex flex-col" style="transform: translate(-50%, -50%); pointer-events: all;" onclick="event.stopPropagation();">
            <div class="p-4 border-b border-white/10 flex items-center justify-between flex-shrink-0">
                <span class="text-white font-semibold flex items-center gap-2">
                    <i class="fas fa-eye text-yellow-500"></i>Where to Watch
                </span>
                <button onclick="modals.closeWatch()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-6 text-gray-300"></div>
        </div>
    </div>

    <!-- ===== MODAL: MORE VIDEOS ===== -->
    <div id="modal-videos" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-30" onclick="modals.closeVideos(event)">
        <div class="menu fixed top-1/2 left-1/2 z-40 w-[90vw] max-w-md max-h-[80vh] rounded-2xl overflow-hidden shadow-2xl flex flex-col" style="transform: translate(-50%, -50%); pointer-events: all;" onclick="event.stopPropagation();">
            <div class="p-4 border-b border-white/10 flex items-center justify-between flex-shrink-0">
                <span class="text-white font-semibold flex items-center gap-2">
                    <i class="fas fa-plus text-yellow-500"></i>More Videos
                </span>
                <button onclick="modals.closeVideos()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-6 text-gray-300"></div>
        </div>
    </div>

    <!-- ===== MODAL: VIDEO PLAYER ===== -->
    <div id="modal-player" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4" onclick="closeVideoPlayer(event)">
        <div class="relative w-full max-w-4xl" onclick="event.stopPropagation();">
            <button onclick="closeVideoPlayer()" class="absolute -top-12 right-0 text-white hover:text-yellow-400 transition-colors z-50">
                <i class="fas fa-times text-3xl"></i>
            </button>
            <div id="player-container"></div>
        </div>
    </div>

    <!-- ===== MAIN APPLICATION SCRIPT ===== -->
    <script src="script.js"></script>
</body>
</html>
